<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>OG card preview — In his words.</title>
<link rel="preconnect" href="https://fonts.bunny.net" crossorigin>
<link href="https://fonts.bunny.net/css?family=archivo:300,400,500,700,800&display=swap" rel="stylesheet">
<!--
  Live render of the 1200x630 share image with the real Archivo webfont.
  Screenshot the white card (it sits on a grey backdrop so the crop edge is
  obvious) to produce og-image.png. On a 2x/Retina display the capture is
  2400x1260 — downscale to 1200x630 if you want the exact spec size.
-->
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    min-height:100vh;background:#c9c9c3;
    display:flex;align-items:center;justify-content:center;padding:40px;
    font-family:'Archivo','Helvetica Neue',Helvetica,Arial,system-ui,sans-serif;
  }
  .card{
    width:1200px;height:630px;flex:0 0 auto;
    background:#ffffff;color:#111111;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    padding:64px 72px;display:flex;flex-direction:column;
    box-shadow:0 10px 40px rgba(0,0,0,.18);
  }
  .masthead{
    font-size:46px;font-weight:800;letter-spacing:-0.01em;line-height:1;
    padding-bottom:22px;border-bottom:4px solid #111111;
  }
  .body{flex:1 1 auto;display:flex;flex-direction:column;justify-content:center;padding-block:20px;}
  .lede{
    font-size:56px;font-weight:300;line-height:1.14;letter-spacing:-0.015em;
    max-width:20ch;
  }
  .lede b{font-weight:800;}
  .sub{
    margin-top:26px;font-size:24px;font-weight:400;line-height:1.4;color:#555555;
    max-width:44ch;
  }
  .sub u{
    text-decoration:underline;text-decoration-thickness:2px;
    text-underline-offset:3px;text-decoration-color:#111;
  }
  .foot{
    display:flex;align-items:baseline;justify-content:space-between;
    border-top:1px solid #d7d7d1;padding-top:18px;
  }
  .url{font-size:22px;font-weight:700;letter-spacing:0.02em;}
  .tag{font-size:16px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:#999;}
</style>
</head>
<body>
  <div class="card">
    <div class="masthead">In his words.</div>
    <div class="body">
      <div class="lede">A verbatim record of what <b>Donald&nbsp;Trump</b> has said.</div>
      <div class="sub">Each statement quoted exactly and <u>linked to its original source</u> &mdash; nothing paraphrased.</div>
    </div>
    <div class="foot">
      <span class="url">therealtrump.info</span>
      <span class="tag">Sourced &middot; Verbatim</span>
    </div>
  </div>
</body>
</html>
